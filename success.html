<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Complete — YourAnimal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
</head>
<body>
  <main class="success-page">
    <div class="success-card">
      <div class="success-icon">🎉</div>
      <h1 id="success-title">Payment complete!</h1>
      <p id="success-msg">Redirecting you in a moment...</p>
      <button class="go-results-btn" id="go-btn" onclick="goNext()">Continue →</button>
    </div>
  </main>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script src="js/paywall.js"></script>
  <script>
    const REDIRECT = {
      name_gen:     { page: 'name-generator.html', title: 'Name Generator unlocked!', msg: 'You can now use the Name Generator as many times as you like.' },
      care_plan:    { page: 'care-plan.html',       title: 'Care Plan unlocked!', msg: 'Access personalized care plans for all pets.' },
      quiz_unlock:  { page: 'results.html',         title: 'Full TOP 5 results unlocked!', msg: 'Check out all your pet match results now.' },
      subscription: { page: 'index.html',           title: 'Subscription active! 🌟', msg: 'Enjoy 30 days of unlimited access to the Name Generator, Care Plan, and Quiz TOP 5.' },
    };

    const params = new URLSearchParams(window.location.search);
    const type = params.get('type') || 'quiz_unlock';

    // Process payment success
    Paywall.handleSuccess(type);

    // Update UI
    const info = REDIRECT[type] || REDIRECT['quiz_unlock'];
    document.getElementById('success-title').textContent = info.title;
    document.getElementById('success-msg').textContent = info.msg;
    document.getElementById('go-btn').textContent =
      type === 'quiz_unlock' ? 'View Full Results →' : 'Get Started →';

    function goNext() {
      if (type === 'quiz_unlock') {
        window.location.href = 'results.html?unlocked=1';
      } else {
        window.location.href = info.page;
      }
    }

    setTimeout(goNext, 3000);
  </script>
</body>
</html>
