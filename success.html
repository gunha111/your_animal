<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 완료 — YourAnimal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
</head>
<body>
  <main class="success-page">
    <div class="success-card">
      <div class="success-icon">🎉</div>
      <h1 id="success-title">결제가 완료됐어요!</h1>
      <p id="success-msg">잠시 후 자동으로 이동합니다...</p>
      <button class="go-results-btn" id="go-btn" onclick="goNext()">계속하기 →</button>
    </div>
  </main>
  <script src="js/paywall.js"></script>
  <script>
    const REDIRECT = {
      name_gen:     { page: 'name-generator.html', title: '이름 생성기가 잠금 해제됐어요!', msg: '이름 생성기를 무제한으로 이용하실 수 있어요.' },
      care_plan:    { page: 'care-plan.html',       title: '케어 플랜이 잠금 해제됐어요!', msg: '모든 반려동물의 맞춤 케어 플랜을 이용하실 수 있어요.' },
      quiz_unlock:  { page: 'results.html',         title: 'TOP 5 전체 결과가 잠금 해제됐어요!', msg: '모든 반려동물 매칭 결과를 확인해보세요.' },
      subscription: { page: 'index.html',           title: '구독이 시작됐어요! 🌟',         msg: '30일간 이름 생성기 · 케어 플랜 · 퀴즈 TOP5 모든 기능을 이용하실 수 있어요.' },
    };

    const params = new URLSearchParams(window.location.search);
    const type = params.get('type') || 'quiz_unlock';

    // Process payment success
    Paywall.handleSuccess(type);

    // Update UI
    const info = REDIRECT[type] || REDIRECT['quiz_unlock'];
    document.getElementById('success-title').textContent = info.title;
    document.getElementById('success-msg').textContent = info.msg;
    document.getElementById('go-btn').textContent =
      type === 'quiz_unlock' ? '전체 결과 보기 →' : '바로 이용하기 →';

    function goNext() {
      if (type === 'quiz_unlock') {
        window.location.href = 'results.html?unlocked=1';
      } else {
        window.location.href = info.page;
      }
    }

    setTimeout(goNext, 3000);
  </script>
</body>
</html>
