<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Complete — My Pet Generator</title>
  <meta name="description" content="Your purchase is complete. Access your full Top 5 pet matches and personalized care guide." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0JS339QR6G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0JS339QR6G');
  </script>
</head>
<body>
  <main class="success-page">
    <div class="success-card">
      <div class="success-icon">🎉</div>
      <h1 id="success-title">Payment complete!</h1>
      <p id="success-msg">Redirecting you in a moment...</p>
      <button class="go-results-btn" id="go-btn" onclick="goNext()">Continue →</button>
    </div>
  </main>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/paywall.js"></script>
  <script>
    const REDIRECT = {
      name_gen:     { page: 'name-generator.html', title: 'Name Generator unlocked! 🎲', msg: 'You can now generate names as many times as you like.' },
      care_plan:    { page: 'care-plan.html',       title: 'Care Plan unlocked! 📋',      msg: 'Access personalized care plans for all pets.' },
      quiz_unlock:  { page: 'results.html',         title: 'Full TOP 5 unlocked! 🏆',     msg: 'Your complete pet match results are ready.' },
      subscription: { page: 'index.html',           title: 'Subscription active! 🌟',     msg: 'Enjoy 30 days of unlimited access to all features.' },
    };

    const params = new URLSearchParams(window.location.search);
    const type = params.get('type') || 'quiz_unlock';
    const info = REDIRECT[type] || REDIRECT['quiz_unlock'];

    document.getElementById('success-title').textContent = info.title;
    document.getElementById('go-btn').textContent =
      type === 'quiz_unlock' ? 'View Full Results →' : 'Get Started →';

    // Verify with Supabase (webhook may take 1-3s), then unlock
    async function init() {
      const msgEl = document.getElementById('success-msg');
      msgEl.textContent = 'Confirming your purchase...';

      // Retry Supabase verification up to 5× (webhook latency)
      let verified = false;
      for (let i = 0; i < 5; i++) {
        verified = await Paywall.verifyAndUnlock(type);
        if (verified) break;
        await new Promise(r => setTimeout(r, 1200));
      }

      // Fallback: trust Paddle's successUrl regardless
      if (!verified) Paywall.handleSuccess(type);

      // Track purchase in GA4
      const prices = { quiz_unlock: 5.99, care_plan: 5.99, name_gen: 2.99, subscription: 5.99 };
      if (typeof gtag === 'function') {
        gtag('event', 'purchase_completed', { plan: type, value: prices[type] || 0, currency: 'USD' });
      }

      msgEl.textContent = info.msg;
      setTimeout(goNext, 2500);
    }

    function goNext() {
      // Clear server-verify cache so results.html re-checks after payment
      sessionStorage.removeItem('mpg_sv_quiz');
      window.location.href = type === 'quiz_unlock' ? 'results.html' : info.page;
    }

    init();
  </script>
</body>
</html>
