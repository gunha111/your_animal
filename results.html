<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Pet Match Results | My Pet Generator</title>
  <meta name="description" content="See which pet best matches your personality and lifestyle based on your quiz answers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
  <meta property="og:title" content="Your Pet Match Results | My Pet Generator" />
  <meta property="og:description" content="See which pet best matches your personality and lifestyle." />
  <meta property="og:image" content="https://mypetgenerator.com/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://mypetgenerator.com/results.html" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0JS339QR6G"></script>

    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window,document,"clarity","script","vydckg629a");

  <style>
    /* ── Share Card Section ── */
    .share-section { margin-top: 24px; }
    .share-label { font-size: 0.85rem; font-weight: 700; color: #6b7280; text-align: center; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .share-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .share-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 11px 18px; border-radius: 12px; border: none; cursor: pointer;
      font-size: 0.88rem; font-weight: 700; transition: transform 0.15s, box-shadow 0.15s;
      min-height: 44px;
    }
    .share-btn:active { transform: scale(0.96); }
    .share-native { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #fff; box-shadow: 0 4px 12px rgba(79,172,254,0.35); }
    .share-card-dl { background: #f3f4f6; color: #374151; }
    .share-twitter { background: #000; color: #fff; }
    .share-copy { background: #f3f4f6; color: #374151; }

    /* ── Blurred Paywall Preview ── */
    /* ── Locked Dummy Cards ── */
    .locked-preview-list { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }

    .locked-card {
      position: relative;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s;
    }
    .locked-card:active { transform: scale(0.98); }

    .locked-card-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      filter: blur(4px);
      user-select: none;
      pointer-events: none;
    }
    .locked-card-rank {
      font-size: 0.72rem; font-weight: 800; color: #fff;
      border-radius: 6px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0;
    }
    .locked-card-emoji-wrap {
      width: 44px; height: 44px; border-radius: 50%;
      background: #e5e7eb; display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; flex-shrink: 0;
    }
    .locked-card-emoji-blur { opacity: 0.3; }
    .locked-card-info { flex: 1; }
    .locked-card-name-bar {
      height: 14px; background: #d1d5db; border-radius: 99px;
      width: 70%; margin-bottom: 6px;
    }
    .locked-card-sub-bar {
      height: 10px; background: #e5e7eb; border-radius: 99px;
      width: 45%; margin-bottom: 10px;
    }
    .locked-bar-bg { height: 6px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
    .locked-bar-fill { height: 100%; border-radius: 99px; }
    .locked-card-pct {
      font-size: 1.1rem; font-weight: 900; flex-shrink: 0; opacity: 0.25;
    }

    /* Overlay */
    .locked-card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(17, 24, 39, 0.55);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 14px;
    }
    .locked-card-lock { font-size: 1.6rem; }
    .locked-card-cta {
      font-size: 0.8rem; font-weight: 700; color: #fff;
      background: rgba(99,102,241,0.9);
      border-radius: 99px; padding: 4px 14px;
    }

    /* Big unlock CTA */
    .unlock-big-btn {
      display: block; width: 100%;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff; border: none; border-radius: 14px;
      font-size: 1.05rem; font-weight: 800;
      padding: 16px; cursor: pointer;
      margin: 4px 0 20px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
      min-height: 54px;
    }
    .unlock-big-btn:active { transform: scale(0.98); }

    /* ── Upsell Header ── */
    .upsell-headline {
      text-align: center; margin-bottom: 6px;
    }
    .upsell-headline h3 {
      font-size: 1.2rem; font-weight: 800; color: #111827; margin: 0 0 6px;
    }
    .upsell-headline p {
      font-size: 0.9rem; color: #6b7280; margin: 0 0 20px; line-height: 1.5;
    }
    .upsell-gap-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fef3c7; color: #92400e; font-size: 0.82rem; font-weight: 700;
      padding: 6px 14px; border-radius: 99px; margin-bottom: 20px;
    }

    /* Hidden canvas for share card */
    #share-canvas { display: none; }

    /* Challenge modal */
    #challenge-modal {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.55); align-items: center; justify-content: center; padding: 20px;
    }
    #challenge-modal.open { display: flex; }
    .challenge-box {
      background: #fff; border-radius: 24px; padding: 36px 28px; max-width: 420px; width: 100%;
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative;
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .challenge-close {
      position: absolute; top: 14px; right: 18px; background: none; border: none;
      font-size: 1.4rem; cursor: pointer; color: #9ca3af; line-height: 1;
    }
    .challenge-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .challenge-btn {
      padding: 13px 20px; border-radius: 12px; border: none; font-size: 0.92rem;
      font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-whatsapp { background: #25d366; color: #fff; }
    .btn-copy-link { background: #f3f4f6; color: #1f2937; }
    .btn-sms { background: #6366f1; color: #fff; }
  </style>
</head>
<body>

  <!-- Hidden canvas for Instagram Story card generation -->
  <canvas id="share-canvas"></canvas>

  <!-- Challenge a Friend Modal -->
  <div id="challenge-modal" role="dialog" aria-modal="true">
    <div class="challenge-box">
      <button class="challenge-close" onclick="closeChallenge()">×</button>
      <div style="font-size:2.8rem;margin-bottom:10px;">🐾</div>
      <h2 style="font-size:1.3rem;margin:0 0 8px;">Challenge a Friend!</h2>
      <p style="color:#6b7280;font-size:0.9rem;margin:0 0 4px;">Dare them to find their perfect pet match.</p>
      <p id="challenge-sub" style="color:#6366f1;font-weight:700;font-size:0.88rem;margin:0;"></p>
      <div class="challenge-btns">
        <button class="challenge-btn btn-whatsapp" onclick="challengeWhatsApp()">💬 Send on WhatsApp</button>
        <button class="challenge-btn btn-sms" onclick="challengeSMS()">📱 Send via SMS</button>
        <button class="challenge-btn btn-copy-link" onclick="challengeCopyLink()">🔗 Copy challenge link</button>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <span class="logo-emoji">🐾</span>
          My Pet Generator
        </a>
        <button class="retake-btn" onclick="retakeQuiz()" style="padding:8px 20px;font-size:0.85rem;">Retake Quiz</button>
      </div>
    </div>
  </header>

  <!-- RESULTS -->
  <main class="results-page">
    <div class="container" id="results-container">
      <!-- Rendered by JS -->
    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script src="data/questions.js"></script>
  <script src="data/pets.js"></script>
  <script src="js/scoring.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/paywall.js"></script>
  <script>

    const results = JSON.parse(sessionStorage.getItem('quizResults') || 'null');
    const urlParams = new URLSearchParams(window.location.search);
    const isUnlocked = urlParams.get('unlocked') === '1' || sessionStorage.getItem('unlocked') === '1';

    if (isUnlocked) sessionStorage.setItem('unlocked', '1');

    function retakeQuiz() {
      sessionStorage.removeItem('quizResults');
      sessionStorage.removeItem('quizAnswers');
      sessionStorage.removeItem('unlocked');
      window.location.href = 'quiz.html';
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Track referral source
    (function() {
      const params = new URLSearchParams(location.search);
      const ref = params.get('ref');
      if (ref) sessionStorage.setItem('mpg_ref', ref);
    })();

    function copyLink() {
      navigator.clipboard.writeText('https://mypetgenerator.com/quiz.html')
        .then(() => showToast('Quiz link copied! Share it with friends 🐾'))
        .catch(() => showToast('Copy failed. URL: mypetgenerator.com/quiz.html'));
    }

    function sendToFriend() {
      const url = 'https://mypetgenerator.com/quiz.html?ref=share';
      const text = 'I just found my perfect pet match! 🐾 Take this free quiz to find yours →';
      if (navigator.share) {
        navigator.share({ title: 'My Pet Generator', text, url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url)
          .then(() => showToast('Link copied — paste it to a friend! 🐾'))
          .catch(() => showToast('Share link: mypetgenerator.com/quiz.html?ref=share'));
      }
    }

    function shareTwitter(petName, pct, emoji) {
      const text = encodeURIComponent(`I'm a ${pct}% match with a ${emoji} ${petName}! 🐾 What's your perfect pet? Take the free quiz →`);
      const url = encodeURIComponent('https://mypetgenerator.com/quiz.html');
      window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
    }

    // ── Share Card (Instagram Story) ─────────────────────────
    function generateShareCard(pet, result) {
      const canvas = document.getElementById('share-canvas');
      const W = 1080, H = 1920;
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0, '#3b82f6');
      grad.addColorStop(0.5, '#8b5cf6');
      grad.addColorStop(1, '#ec4899');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Subtle noise overlay circle
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.beginPath();
      ctx.arc(W * 0.8, H * 0.15, 500, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(W * 0.2, H * 0.75, 380, 0, Math.PI * 2);
      ctx.fill();

      // White card panel
      ctx.fillStyle = 'rgba(255,255,255,0.14)';
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(80, 350, W - 160, H - 500, 60);
      } else {
        ctx.rect(80, 350, W - 160, H - 500);
      }
      ctx.fill();

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Brand
      ctx.font = 'bold 52px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillText('🐾 My Pet Generator', W / 2, 200);

      ctx.font = '40px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.fillText('mypetgenerator.com', W / 2, 280);

      // Pet emoji
      ctx.font = '340px sans-serif';
      ctx.fillText(pet.emoji, W / 2, 630);

      // Label
      ctx.font = '500 52px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fillText('My perfect pet match is', W / 2, 900);

      // Pet name
      ctx.font = 'bold 150px sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(pet.name, W / 2, 1070);

      // Match %
      ctx.font = 'bold 80px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillText(`${result.percentage}% compatibility`, W / 2, 1180);

      // Divider
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(W * 0.2, 1250);
      ctx.lineTo(W * 0.8, 1250);
      ctx.stroke();

      // Traits
      const traits = (pet.traits || []).slice(0, 3);
      ctx.font = 'bold 55px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      traits.forEach((trait, i) => {
        ctx.fillText(`· ${trait}`, W / 2, 1340 + i * 90);
      });

      // Footer CTA
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '48px sans-serif';
      ctx.fillText('Take the free quiz ↓', W / 2, 1750);

      ctx.font = 'bold 44px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.fillText('mypetgenerator.com/quiz.html', W / 2, 1820);
    }

    async function shareResult(pet, result) {
      const shareText = `I'm a ${result.percentage}% match with a ${pet.emoji} ${pet.name}! 🐾 What's your perfect pet?`;
      const shareUrl = 'https://mypetgenerator.com/quiz.html?ref=share';
      if (navigator.share) {
        try {
          await navigator.share({ title: 'My Pet Generator', text: shareText, url: shareUrl });
        } catch (err) {
          if (err.name !== 'AbortError') copyLink();
        }
      } else {
        copyLink();
      }
      setTimeout(() => openChallenge(pet, result), 600);
    }

    function openChallenge(pet, result) {
      const sub = document.getElementById('challenge-sub');
      if (sub && pet) sub.textContent = `You matched ${pet.emoji} ${pet.name} at ${result.percentage}% — can they beat it?`;
      document.getElementById('challenge-modal').classList.add('open');
    }
    function closeChallenge() {
      document.getElementById('challenge-modal').classList.remove('open');
    }
    function _challengeText() {
      const pet = window._sharePet, res = window._shareResult;
      const pct = res ? res.percentage : '??';
      const emoji = pet ? pet.emoji : '🐾';
      const name = pet ? pet.name : 'a pet';
      return `I matched ${pct}% with ${emoji} ${name} on My Pet Generator! Can you beat my score? 🐾 Try it free →`;
    }
    function challengeWhatsApp() {
      const text = encodeURIComponent(_challengeText() + ' https://mypetgenerator.com/quiz.html?ref=challenge');
      window.open(`https://wa.me/?text=${text}`, '_blank');
      closeChallenge();
    }
    function challengeSMS() {
      const text = encodeURIComponent(_challengeText() + ' https://mypetgenerator.com/quiz.html?ref=challenge');
      window.open(`sms:?body=${text}`, '_blank');
      closeChallenge();
    }
    function challengeCopyLink() {
      const msg = _challengeText() + ' https://mypetgenerator.com/quiz.html?ref=challenge';
      navigator.clipboard.writeText(msg)
        .then(() => showToast('Challenge message copied! Paste it anywhere 🐾'))
        .catch(() => showToast('Link: mypetgenerator.com/quiz.html?ref=challenge'));
      closeChallenge();
    }

    function downloadShareCard(pet, result) {
      try {
        generateShareCard(pet, result);
        const canvas = document.getElementById('share-canvas');
        const dataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `my-${pet.id}-match-card.png`;
        link.href = dataUrl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('Story card downloaded! Share it on Instagram 📸');
      } catch (e) {
        showToast('Download failed — try again or screenshot your results!');
      }
    }

    function openPayment() {
      Paywall.pay('quiz_unlock');
    }

    // ── Render ──────────────────────────────────────────────
    function render() {
      const container = document.getElementById('results-container');

      if (!results || results.length === 0) {
        container.innerHTML = `
          <div style="text-align:center;padding:80px 20px;">
            <div style="font-size:4rem;margin-bottom:16px;">😕</div>
            <h2 style="margin-bottom:12px;">No results found</h2>
            <p style="color:var(--text-muted);margin-bottom:28px;">Please complete the quiz first!</p>
            <a href="quiz.html" class="cta-btn">Start the Quiz →</a>
          </div>
        `;
        return;
      }

      const top5 = results.slice(0, 5);
      const winner = top5[0];
      const pet = PETS[winner.pet];
      const matchInfo = getMatchLabel(winner.percentage);

      // Store for share button onclick handlers (avoids JSON-in-attribute quoting issues)
      window._sharePet = pet;
      window._shareResult = winner;

      container.innerHTML = `
        <!-- Header -->
        <div class="results-header">
          <div class="trophy">🏆</div>
          <h1>Your Pet Match Results</h1>
          <p>Based on your 25 answers!</p>
        </div>

        <!-- Winner Card -->
        <div class="winner-card">
          <div class="winner-ribbon">BEST MATCH</div>

          <div class="winner-top">
            <div class="winner-emoji-wrap">${pet.emoji}</div>
            <div class="winner-info">
              <div class="match-badge">${matchInfo.label}</div>
              <h2>${pet.name}</h2>
              <p class="tagline">${pet.tagline}</p>
            </div>
          </div>

          <div class="match-bar-wrap">
            <div class="match-bar-label">
              <span>Match Score</span>
              <span class="pct">${winner.percentage}%</span>
            </div>
            <div class="match-bar-bg">
              <div class="match-bar-fill" id="winner-bar" style="width:0%"></div>
            </div>
          </div>

          <p class="winner-desc">${pet.description}</p>

          <div class="traits-wrap">
            ${pet.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
          </div>

          <div class="compat-list">
            ${pet.compatibility_points.map(p => `
              <div class="compat-item">
                <span class="compat-icon">✓</span>
                <span>${p}</span>
              </div>
            `).join('')}
          </div>

          <div class="fun-fact-box">
            <strong>💡 Did you know?</strong>
            ${pet.fun_fact}
          </div>

          <div class="meta-grid">
            <div class="meta-item">
              <div class="meta-label">Care Level</div>
              <div class="meta-val">${pet.care_level}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Space Needed</div>
              <div class="meta-val">${pet.space_needed}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Lifespan</div>
              <div class="meta-val">${pet.lifespan}</div>
            </div>
          </div>

          <!-- Share -->
          <div class="share-section">
            <div class="share-label">Share your result</div>
            <div class="share-btns">
              <button class="share-btn share-native" onclick="shareResult(window._sharePet, window._shareResult)">
                🔗 Share Result
              </button>
              <button class="share-btn share-card-dl" onclick="downloadShareCard(window._sharePet, window._shareResult)">
                📸 Story Card
              </button>
              <button class="share-btn share-twitter" onclick="shareTwitter(window._sharePet.name, window._shareResult.percentage, window._sharePet.emoji)">
                𝕏 Twitter
              </button>
            </div>
            <div style="margin-top:14px;padding:14px;background:#f5f3ff;border-radius:12px;text-align:center;">
              <p style="margin:0 0 10px;font-size:0.88rem;color:#4b5563;">🐾 Know a friend who should try this?</p>
              <button class="share-btn" style="background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;" onclick="sendToFriend()">
                💌 Send to a Friend
              </button>
            </div>
          </div>
        </div>

        <!-- Paywall or Unlocked -->
        ${isUnlocked ? renderUnlocked(top5) : renderPaywall(top5)}

        <!-- Retake -->
        <div class="retake-section">
          <button class="retake-btn" onclick="retakeQuiz()">🔄 Retake the Quiz</button>
        </div>
      `;

      // Animate bars
      setTimeout(() => {
        document.getElementById('winner-bar').style.width = winner.percentage + '%';
      }, 300);

      if (isUnlocked) {
        setTimeout(() => {
          document.querySelectorAll('[data-pct]').forEach(el => {
            el.style.width = el.dataset.pct + '%';
          });
        }, 400);
      }
    }

    function renderPaywall(top5) {
      const rankLabels = ['#2', '#3', '#4', '#5'];
      const rankColors = ['#6366f1', '#3b82f6', '#10b981', '#f59e0b'];
      const winner = top5[0];
      const gap2 = winner.percentage - top5[1].percentage;

      // Dummy data — completely hides real results
      const dummies = [
        { emoji: '?', bar: 82 },
        { emoji: '?', bar: 74 },
        { emoji: '?', bar: 67 },
        { emoji: '?', bar: 58 },
      ];

      return `
        <div class="paywall-section">

          <div class="upsell-headline">
            <h3>🔒 4 more matches are waiting</h3>
            <p>Your quiz revealed a full Top 5 — but they're locked until you unlock.</p>
            ${gap2 <= 8
              ? `<div class="upsell-gap-badge">⚠️ Your #2 match is only ${gap2}% behind your #1 — it could be a better fit</div>`
              : `<div class="upsell-gap-badge">👀 One of your hidden matches might surprise you</div>`
            }
          </div>

          <!-- Locked dummy cards -->
          <div class="locked-preview-list">
            ${dummies.map((d, i) => `
              <div class="locked-card" onclick="openPayment()">
                <div class="locked-card-inner">
                  <span class="locked-card-rank" style="background:${rankColors[i]}">${rankLabels[i]}</span>
                  <div class="locked-card-emoji-wrap">
                    <div class="locked-card-emoji-blur">🐾</div>
                  </div>
                  <div class="locked-card-info">
                    <div class="locked-card-name-bar"></div>
                    <div class="locked-card-sub-bar"></div>
                    <div class="locked-bar-bg">
                      <div class="locked-bar-fill" style="width:${d.bar}%;background:${rankColors[i]};opacity:0.35;"></div>
                    </div>
                  </div>
                  <div class="locked-card-pct" style="color:${rankColors[i]}">${d.bar}%</div>
                </div>
                <div class="locked-card-overlay">
                  <div class="locked-card-lock">🔒</div>
                  <div class="locked-card-cta">Tap to reveal</div>
                </div>
              </div>
            `).join('')}
          </div>

          <button class="unlock-big-btn" onclick="openPayment()">
            🔓 Unlock My Full Results
          </button>

          <!-- Pricing Options -->
          <div class="pricing-options">

            <!-- One-time option -->
            <div class="pricing-card" onclick="openPayment()">
              <div class="pricing-card-header">
                <div class="pricing-card-title">One-Time Unlock</div>
                <div class="pricing-card-price">$2.99</div>
                <div class="pricing-card-period">single purchase</div>
              </div>
              <ul class="pricing-card-features">
                <li>✓ TOP 2–5 results revealed</li>
                <li>✓ Detailed analysis for each pet</li>
                <li>✓ One quiz unlock only</li>
                <li style="color:#9CA3AF;">✗ Name Generator</li>
                <li style="color:#9CA3AF;">✗ Care Plan Generator</li>
                <li style="color:#9CA3AF;">✗ Unlimited retakes</li>
              </ul>
              <button class="pricing-card-btn secondary-btn" onclick="openPayment()"
                data-ab-test="unlock-cta-copy"
                data-ab-variants="A,B">Unlock Results</button>
            </div>

            <!-- Subscription option — highlighted -->
            <div class="pricing-card pricing-card-featured" onclick="Paywall.pay('subscription')">
              <div class="pricing-card-badge">⭐ BEST VALUE</div>
              <div class="pricing-card-header">
                <div class="pricing-card-title">All-In-One Plan</div>
                <div class="pricing-card-price">$5.99</div>
                <div class="pricing-card-period">per month</div>
              </div>
              <ul class="pricing-card-features">
                <li>✓ TOP 2–5 results revealed</li>
                <li>✓ Detailed analysis for each pet</li>
                <li>✓ <strong>Unlimited quiz retakes</strong></li>
                <li>✓ <strong>Name Generator</strong> (worth $1.99)</li>
                <li>✓ <strong>Care Plan Generator</strong> (worth $2.99)</li>
                <li>✓ <strong>Priority access to new features</strong></li>
              </ul>
              <div class="pricing-savings">Save $1.98 vs. buying separately</div>
              <button class="pricing-card-btn featured-btn">Get All-In-One →</button>
            </div>

          </div>

          <!-- Payment methods -->
          <div class="pay-methods" style="margin-top:16px;">
            <div class="pay-method card"><span class="pay-icon">💳</span>Credit / Debit Card</div>
            <div class="pay-method card"><span class="pay-icon">🏦</span>PayPal</div>
            <div class="pay-method card"><span class="pay-icon">🔒</span>Secure via Paddle</div>
          </div>

          <div class="unlock-features" style="margin-top:16px;">
            <span>🔐 Secure payment via Paddle</span>
            <span>⚡ Instant access after payment</span>
          </div>
          <p style="margin-top:14px;font-size:0.75rem;color:#9CA3AF;line-height:1.6;background:#F9FAFB;border-radius:10px;padding:10px 12px;text-align:left;">
            💡 You already saw your #1 result for free — unlock the rest to see your full picture.<br/>
            14-day refund available. See our <a href="refund.html" style="color:var(--primary);">Refund Policy</a>.
          </p>
        </div>
      `;
    }

    function renderUnlocked(top5) {
      const rankColors = ['gold', 'silver', 'bronze', '', ''];
      const rankEmojis = ['🥇', '🥈', '🥉', '#4', '#5'];

      return `
        <div class="unlocked-results">
          <div style="text-align:center;margin-bottom:28px;padding:20px;background:linear-gradient(135deg,#DCFCE7,#D1FAE5);border-radius:var(--radius);">
            <div style="font-size:2rem;margin-bottom:8px;">🎉</div>
            <div style="font-weight:800;font-size:1.1rem;color:#15803D;">All results unlocked!</div>
            <div style="color:#16A34A;font-size:0.9rem;">Check your compatibility with all TOP 5 pets</div>
          </div>
          <div class="result-cards-list">
            ${top5.map((r, i) => {
              const p = PETS[r.pet];
              const gradients = [
                'linear-gradient(90deg,#6366F1,#EC4899)',
                'linear-gradient(90deg,#3B82F6,#6366F1)',
                'linear-gradient(90deg,#10B981,#3B82F6)',
                'linear-gradient(90deg,#F59E0B,#10B981)',
                'linear-gradient(90deg,#9CA3AF,#F59E0B)',
              ];
              return `
                <div class="result-card" style="animation-delay:${i * 0.1}s">
                  <div class="result-rank ${rankColors[i]}">${rankEmojis[i]}</div>
                  <div class="result-emoji">${p.emoji}</div>
                  <div class="result-info">
                    <h3>${p.name}</h3>
                    <div class="result-tagline">${p.tagline}</div>
                    <div class="result-bar-row">
                      <div class="result-bar-bg">
                        <div class="result-bar-fill" data-pct="${r.percentage}" style="width:0%;background:${gradients[i]}"></div>
                      </div>
                      <div class="result-pct">${r.percentage}%</div>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    render();

    // Record quiz completion for social proof counter + distribution chart
    (function recordCompletion() {
      if (!results || results.length === 0) return;
      if (sessionStorage.getItem('mpg_completion_recorded')) return;
      if (typeof SUPABASE_URL === 'undefined' || typeof SUPABASE_ANON_KEY === 'undefined') return;
      sessionStorage.setItem('mpg_completion_recorded', '1');
      const topPet = results[0].pet;
      fetch(`${SUPABASE_URL}/rest/v1/quiz_completions`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ top_pet: topPet, ref_source: sessionStorage.getItem('mpg_ref') || null }),
      }).catch(() => {}); // fail silently
    })();
  </script>
  <script src="js/ab-test.js"></script>
  <script src="js/analytics.js"></script>
</body>
</html>
