<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Results — YourAnimal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <span class="logo-emoji">🐾</span>
          YourAnimal
        </a>
        <button class="retake-btn" onclick="retakeQuiz()" style="padding:8px 20px;font-size:0.85rem;">Retake Quiz</button>
      </div>
    </div>
  </header>

  <!-- RESULTS -->
  <main class="results-page">
    <div class="container" id="results-container">
      <!-- Rendered by JS -->
    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script src="data/questions.js"></script>
  <script src="data/pets.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/paywall.js"></script>
  <script>

    const results = JSON.parse(sessionStorage.getItem('quizResults') || 'null');
    const urlParams = new URLSearchParams(window.location.search);
    const isUnlocked = urlParams.get('unlocked') === '1' || sessionStorage.getItem('unlocked') === '1';

    if (isUnlocked) sessionStorage.setItem('unlocked', '1');

    function retakeQuiz() {
      sessionStorage.removeItem('quizResults');
      sessionStorage.removeItem('quizAnswers');
      sessionStorage.removeItem('unlocked');
      window.location.href = 'quiz.html';
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.origin + '/quiz.html')
        .then(() => showToast('Link copied!'))
        .catch(() => showToast('Copy failed. Please copy the URL manually.'));
    }

    function shareTwitter(petName, pct) {
      const text = encodeURIComponent(`My pet personality result: ${pct}% match with a ${petName}! 🐾 Take the quiz too → `);
      const url = encodeURIComponent(window.location.origin + '/quiz.html');
      window.open(`https://twitter.com/intent/tweet?text=${text}${url}`, '_blank');
    }

    function openPayment() {
      Paywall.pay('quiz_unlock');
    }

    function render() {
      const container = document.getElementById('results-container');

      if (!results || results.length === 0) {
        container.innerHTML = `
          <div style="text-align:center;padding:80px 20px;">
            <div style="font-size:4rem;margin-bottom:16px;">😕</div>
            <h2 style="margin-bottom:12px;">No results found</h2>
            <p style="color:var(--text-muted);margin-bottom:28px;">Please complete the quiz first!</p>
            <a href="quiz.html" class="cta-btn">Start the Quiz →</a>
          </div>
        `;
        return;
      }

      const top5 = results.slice(0, 5);
      const winner = top5[0];
      const pet = PETS[winner.pet];
      const matchInfo = getMatchLabel(winner.percentage);

      container.innerHTML = `
        <!-- Header -->
        <div class="results-header">
          <div class="trophy">🏆</div>
          <h1>Your Pet Match Results</h1>
          <p>Based on your 25 answers!</p>
        </div>

        <!-- Winner Card -->
        <div class="winner-card">
          <div class="winner-ribbon">BEST MATCH</div>

          <div class="winner-top">
            <div class="winner-emoji-wrap">${pet.emoji}</div>
            <div class="winner-info">
              <div class="match-badge">${matchInfo.label}</div>
              <h2>${pet.name}</h2>
              <p class="tagline">${pet.tagline}</p>
            </div>
          </div>

          <div class="match-bar-wrap">
            <div class="match-bar-label">
              <span>Match Score</span>
              <span class="pct">${winner.percentage}%</span>
            </div>
            <div class="match-bar-bg">
              <div class="match-bar-fill" id="winner-bar" style="width:0%"></div>
            </div>
          </div>

          <p class="winner-desc">${pet.description}</p>

          <div class="traits-wrap">
            ${pet.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
          </div>

          <div class="compat-list">
            ${pet.compatibility_points.map(p => `
              <div class="compat-item">
                <span class="compat-icon">✓</span>
                <span>${p}</span>
              </div>
            `).join('')}
          </div>

          <div class="fun-fact-box">
            <strong>💡 Did you know?</strong>
            ${pet.fun_fact}
          </div>

          <div class="meta-grid">
            <div class="meta-item">
              <div class="meta-label">Care Level</div>
              <div class="meta-val">${pet.care_level}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Space Needed</div>
              <div class="meta-val">${pet.space_needed}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Lifespan</div>
              <div class="meta-val">${pet.lifespan}</div>
            </div>
          </div>

          <!-- Share -->
          <div class="share-section">
            <div class="share-label">Share your result</div>
            <div class="share-btns">
              <button class="share-btn share-twitter" onclick="shareTwitter('${pet.name}', ${winner.percentage})">𝕏 Twitter</button>
              <button class="share-btn share-copy" onclick="copyLink()">🔗 Copy Link</button>
            </div>
          </div>
        </div>

        <!-- Paywall or Unlocked -->
        ${isUnlocked ? renderUnlocked(top5) : renderPaywall(top5)}

        <!-- Retake -->
        <div class="retake-section">
          <button class="retake-btn" onclick="retakeQuiz()">🔄 Retake the Quiz</button>
        </div>
      `;

      // Animate bar
      setTimeout(() => {
        document.getElementById('winner-bar').style.width = winner.percentage + '%';
      }, 300);

      // Animate result bars if unlocked
      if (isUnlocked) {
        setTimeout(() => {
          document.querySelectorAll('[data-pct]').forEach(el => {
            el.style.width = el.dataset.pct + '%';
          });
        }, 400);
      }
    }

    function renderPaywall(top5) {
      const ranks = ['#2', '#3', '#4', '#5'];
      return `
        <div class="paywall-section">
          <div class="paywall-bg"></div>
          <div class="paywall-title">🔒 Curious about your other TOP 4 matches?</div>
          <p class="paywall-sub">There might be even more great pets waiting for you. Unlock the full results!</p>

          <div class="locked-pets-grid">
            ${top5.slice(1).map((r, i) => {
              const p = PETS[r.pet];
              return `
                <div class="locked-pet-card">
                  <div class="locked-pet-rank">${ranks[i]}</div>
                  <div class="locked-pet-emoji">${p.emoji}</div>
                  <div class="locked-pet-info">
                    <div class="locked-pet-name">${p.name}</div>
                    <div class="locked-pct">${r.percentage}% match</div>
                  </div>
                  <div class="locked-overlay">🔒</div>
                </div>
              `;
            }).join('')}
          </div>

          <!-- Pricing Options -->
          <div class="pricing-options">

            <!-- One-time option -->
            <div class="pricing-card" onclick="openPayment()">
              <div class="pricing-card-header">
                <div class="pricing-card-title">One-Time Unlock</div>
                <div class="pricing-card-price">$2.99</div>
                <div class="pricing-card-period">single purchase</div>
              </div>
              <ul class="pricing-card-features">
                <li>✓ TOP 2–5 results revealed</li>
                <li>✓ Detailed analysis for each pet</li>
                <li>✓ One quiz unlock only</li>
                <li style="color:#9CA3AF;">✗ Name Generator</li>
                <li style="color:#9CA3AF;">✗ Care Plan Generator</li>
                <li style="color:#9CA3AF;">✗ Unlimited retakes</li>
              </ul>
              <button class="pricing-card-btn secondary-btn">Unlock Results</button>
            </div>

            <!-- Subscription option — highlighted -->
            <div class="pricing-card pricing-card-featured" onclick="Paywall.pay('subscription')">
              <div class="pricing-card-badge">⭐ BEST VALUE</div>
              <div class="pricing-card-header">
                <div class="pricing-card-title">All-In-One Plan</div>
                <div class="pricing-card-price">$5.99</div>
                <div class="pricing-card-period">per month</div>
              </div>
              <ul class="pricing-card-features">
                <li>✓ TOP 2–5 results revealed</li>
                <li>✓ Detailed analysis for each pet</li>
                <li>✓ <strong>Unlimited quiz retakes</strong></li>
                <li>✓ <strong>Name Generator</strong> (worth $1.99)</li>
                <li>✓ <strong>Care Plan Generator</strong> (worth $2.99)</li>
                <li>✓ <strong>Priority access to new features</strong></li>
              </ul>
              <div class="pricing-savings">Save $1.98 vs. buying separately</div>
              <button class="pricing-card-btn featured-btn">Get All-In-One →</button>
            </div>

          </div>

          <!-- Payment methods -->
          <div class="pay-methods" style="margin-top:16px;">
            <div class="pay-method card"><span class="pay-icon">💳</span>Visa / Mastercard</div>
            <div class="pay-method toss"><span class="pay-icon">🅿️</span>PayPal</div>
            <div class="pay-method kakao"><span class="pay-icon">📱</span>Apple Pay</div>
            <div class="pay-method card"><span class="pay-icon">💳</span>Credit / Debit Card</div>
          </div>

          <div class="unlock-features" style="margin-top:16px;">
            <span>🔐 Secure payment via Paddle</span>
            <span>⚡ Instant access after payment</span>
          </div>
          <p style="margin-top:14px;font-size:0.75rem;color:#9CA3AF;line-height:1.6;background:#F9FAFB;border-radius:10px;padding:10px 12px;text-align:left;">
            💡 You already saw your #1 result for free — if you liked it, go ahead and unlock the rest!<br/>
            14-day refund available. See our <a href="refund.html" style="color:var(--primary);">Refund Policy</a>.
          </p>
        </div>
      `;
    }

    function renderUnlocked(top5) {
      const rankColors = ['gold', 'silver', 'bronze', '', ''];
      const rankEmojis = ['🥇', '🥈', '🥉', '#4', '#5'];

      return `
        <div class="unlocked-results">
          <div style="text-align:center;margin-bottom:28px;padding:20px;background:linear-gradient(135deg,#DCFCE7,#D1FAE5);border-radius:var(--radius);">
            <div style="font-size:2rem;margin-bottom:8px;">🎉</div>
            <div style="font-weight:800;font-size:1.1rem;color:#15803D;">All results unlocked!</div>
            <div style="color:#16A34A;font-size:0.9rem;">Check your compatibility with all TOP 5 pets</div>
          </div>
          <div class="result-cards-list">
            ${top5.map((r, i) => {
              const p = PETS[r.pet];
              const gradients = [
                'linear-gradient(90deg,#6366F1,#EC4899)',
                'linear-gradient(90deg,#3B82F6,#6366F1)',
                'linear-gradient(90deg,#10B981,#3B82F6)',
                'linear-gradient(90deg,#F59E0B,#10B981)',
                'linear-gradient(90deg,#9CA3AF,#F59E0B)',
              ];
              return `
                <div class="result-card" style="animation-delay:${i * 0.1}s">
                  <div class="result-rank ${rankColors[i]}">${rankEmojis[i]}</div>
                  <div class="result-emoji">${p.emoji}</div>
                  <div class="result-info">
                    <h3>${p.name}</h3>
                    <div class="result-tagline">${p.tagline}</div>
                    <div class="result-bar-row">
                      <div class="result-bar-bg">
                        <div class="result-bar-fill" data-pct="${r.percentage}" style="width:0%;background:${gradients[i]}"></div>
                      </div>
                      <div class="result-pct">${r.percentage}%</div>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
